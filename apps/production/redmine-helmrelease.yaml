apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: redmine
  namespace: production
spec:
  interval: 10m
  chart:
    spec:
      chart: ./charts/redmine
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  values:
    replicaCount: 2
    ingress:
      enabled: true
      className: traefik
      host: redmine.local
    database:
      host: redmine-db-rw
      existingSecret: redmine-db-app
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    hpa:
      enabled: true
      minReplicas: 2
      maxReplicas: 5
      targetCPUUtilizationPercentage: 70
